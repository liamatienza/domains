name: Sync

on:
  push:
    branches:
      - main
    paths:
      - "subdomains/**"

jobs:
  sync:
    name: Sync Subdomains to Cloudflare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout domains
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@is-pinoy-dev"

      - name: Install CLI
        run: npm install -g @is-pinoy-dev/cli@latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync subdomains
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: is-pinoy registry sync --dir ./subdomains --yes
