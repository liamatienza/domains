name: Stats

on:
  # schedule:
  #   - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  stats:
    name: Update Subdomain Stats
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Count subdomains
        id: count
        run: |
          COUNT=$(find subdomains -name "*.json" | wc -l | tr -d ' ')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Write stats.json
        run: |
          echo '{' > stats.json
          echo '  "schemaVersion": 1,' >> stats.json
          echo '  "label": "registered subdomains",' >> stats.json
          echo "  \"message\": \"${{ steps.count.outputs.count }}\"," >> stats.json
          echo '  "color": "blue"' >> stats.json
          echo '}' >> stats.json

      - name: Commit and push
        run: |
          git config user.name "Dyep"
          git config user.email "dyep@is-pinoy.dev"
          git add stats.json
          git diff --staged --quiet || {
            git commit -m "chore: update subdomain stats"
            git pull --rebase origin main
            git push https://x:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
          }
